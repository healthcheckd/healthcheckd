name: Run the Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  Create_Packages:
    name: Create Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: "REPO"

      - name: Calculate some variables
        run: |
          (
            echo "GITHUB_REPO_NAME=$(echo "${GITHUB_REPOSITORY}" | cut -d/ -f2)"
            echo "VERSION=$(echo "${GITHUB_REF_NAME}" | sed -e 's/^v//')"
            echo "DESCRIPTION=Health check daemon for AWS ALB/NLB with Prometheus metrics"
            echo "DEB_ARCHITECTURE=all"
            echo "RPM_ARCHITECTURE=noarch"
            echo "ARCHITECTURE=all"
            echo "DEPENDS=python3, python3-aiohttp, python3-yaml, python3-prometheus-client"
            echo "REQUIRES=python3, python3-aiohttp, python3-pyyaml, python3-prometheus_client"
            echo "RELEASE=1"
            cd REPO
            echo "FIRST_YEAR=$(git log $(git rev-list --max-parents=0 HEAD) --date="format:%Y" --format="format:%ad")"
            echo "THIS_COMMIT_YEAR=$(git log HEAD -n1 --date="format:%Y" --format="format:%ad")"
            echo "THIS_COMMIT_DATE=$(git log HEAD -n1 --format="format:%as")"
            if [ "$FIRST_YEAR" = "$THIS_COMMIT_YEAR" ]
            then
              echo "YEAR_RANGE=$FIRST_YEAR"
            else
              echo "YEAR_RANGE=${FIRST_YEAR}-${THIS_COMMIT_YEAR}"
            fi
            cd ..
          ) >> $GITHUB_ENV

      - name: Install system packaging tools
        run: |
          until sudo apt-get update
          do
            sleep 1
          done
          sudo apt-get install -y rpm

      - name: Make Directory Structure
        run: mkdir -p "SOURCES/${GITHUB_REPO_NAME}" SPECS release

      - name: Populate filesystem layout
        run: |
          mkdir -p "SOURCES/${GITHUB_REPO_NAME}/usr/bin"
          mkdir -p "SOURCES/${GITHUB_REPO_NAME}/usr/lib/healthcheckd"
          mkdir -p "SOURCES/${GITHUB_REPO_NAME}/usr/lib/systemd/system"
          mkdir -p "SOURCES/${GITHUB_REPO_NAME}/usr/share/doc/${GITHUB_REPO_NAME}"
          mkdir -p "SOURCES/${GITHUB_REPO_NAME}/etc/healthcheckd/config.d"

          cp REPO/packaging/healthcheckd-wrapper "SOURCES/${GITHUB_REPO_NAME}/usr/bin/healthcheckd"
          cp -r REPO/src/healthcheckd "SOURCES/${GITHUB_REPO_NAME}/usr/lib/healthcheckd/healthcheckd"
          cp REPO/packaging/healthcheckd.service "SOURCES/${GITHUB_REPO_NAME}/usr/lib/systemd/system/healthcheckd.service"
          cp REPO/LICENSE "SOURCES/${GITHUB_REPO_NAME}/usr/share/doc/${GITHUB_REPO_NAME}/LICENSE"
          cp REPO/packaging/config "SOURCES/${GITHUB_REPO_NAME}/etc/healthcheckd/config"
          cp REPO/packaging/config.d/example.yaml "SOURCES/${GITHUB_REPO_NAME}/etc/healthcheckd/config.d/example.yaml"

      - name: Create Control File
        run: |
          mkdir -p SOURCES/${GITHUB_REPO_NAME}/DEBIAN
          (
            echo "Package:      ${GITHUB_REPO_NAME}"
            echo "Version:      ${VERSION}"
            echo "Section:      ${SECTION:-misc}"
            echo "Priority:     ${PRIORITY:-optional}"
            echo "Architecture: ${DEB_ARCHITECTURE}"
            echo "Depends:      ${DEPENDS:-}"
            echo "Maintainer: ${MAINTAINER:-Jon Spriggs <jon@sprig.gs>}"
            echo "Description: ${DESCRIPTION}"
            if [ -n "${HOMEPAGE}" ]
            then
              echo "Homepage: ${HOMEPAGE}"
            fi
          ) | tee SOURCES/${GITHUB_REPO_NAME}/DEBIAN/control
          (
            echo "Files:"
            echo " *"
            echo "Copyright: ${YEAR_RANGE} ${MAINTAINER:-Jon Spriggs <jon@sprig.gs>}"
            echo "License: Unlicense"
            echo ""
            echo "License: Unlicense"
            sed 's/^/ /' "SOURCES/${GITHUB_REPO_NAME}/usr/share/doc/${GITHUB_REPO_NAME}/LICENSE"
          ) | tee SOURCES/${GITHUB_REPO_NAME}/DEBIAN/copyright

      - name: Create postinst script
        run: |
          cat > SOURCES/${GITHUB_REPO_NAME}/DEBIAN/postinst << 'POSTINST'
          #!/bin/sh
          set -e
          if ! getent group healthcheckd >/dev/null 2>&1; then
            groupadd --system healthcheckd
          fi
          if ! getent passwd healthcheckd >/dev/null 2>&1; then
            useradd --system --gid healthcheckd --no-create-home --shell /usr/sbin/nologin healthcheckd
          fi
          if [ -d /run/systemd/system ]; then
            systemctl daemon-reload || true
          fi
          POSTINST
          chmod 755 SOURCES/${GITHUB_REPO_NAME}/DEBIAN/postinst

      - name: Create Spec File
        run: PATH="REPO/.github/scripts:${PATH}" create_spec_file.sh

      - name: Build DEB Package
        run: dpkg-deb --build SOURCES/${GITHUB_REPO_NAME} "${{ env.GITHUB_REPO_NAME }}_${{ env.VERSION }}_${{ env.DEB_ARCHITECTURE }}.deb"

      - name: Build RPM Package
        run: sudo rpmbuild --define "_topdir $(pwd)" -bb SPECS/${GITHUB_REPO_NAME}.spec

      - name: Confirm builds complete
        run: |
          find . -type f -name '*.deb' -exec cp {} release/ \;
          find . -type f -name '*.rpm' -exec cp {} release/ \;
          ls -la release/

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
