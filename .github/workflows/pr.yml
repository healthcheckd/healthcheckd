name: PR Checks

on:
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install . pytest pytest-asyncio pytest-aiohttp pytest-cov aioresponses

      - name: Run tests with coverage
        run: |
          python -m pytest \
            --cov=healthcheckd \
            --cov-report=term-missing \
            --cov-fail-under=100 \
            -W error \
            --strict-markers \
            --tb=short
